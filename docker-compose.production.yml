# ============================================================================\n# 🐳 DOCKER COMPOSE - PRODUCTION (HF Spaces / Cloud Deployment)\n# Hanya untuk reference - gunakan environment variables untuk DATABASE_URL\n# ============================================================================\n# Note: Untuk HF Spaces, jangan push file ini ke repository\n# Gunakan docker-compose.yml biasa dengan environment variables\n# ============================================================================\n\nversion: \"3.8\"\n\nservices:\n  # ⚠️ TIDAK ADA MYSQL SERVICE\n  # Gunakan cloud database (Railway, PlanetScale, Supabase, etc)\n  # Set DATABASE_URL via environment variables\n\n  # 🤖 OLLAMA - EKSTERNAL (Optional)\n  # Untuk production, lebih baik gunakan Ollama di server terpisah\n  # atau gunakan API eksternal (HuggingFace, OpenAI, etc)\n  # Set OLLAMA_URL via environment variables\n\n  # 🚀 RAG CHATBOT API - PRODUCTION\n  rag-chatbot:\n    build: .\n    container_name: rag-chatbot-api-prod\n    ports:\n      - \"7860:7860\"\n    environment:\n      # ☁️ PRODUCTION: Cloud Database\n      # Set di HF Spaces settings, jangan hardcode di sini\n      - DATABASE_URL=${DATABASE_URL}\n      \n      # 🤖 PRODUCTION: External Ollama / API\n      # Set di HF Spaces settings\n      - OLLAMA_URL=${OLLAMA_URL}\n      \n      # 🔧 PYTHON\n      - PYTHONUNBUFFERED=1\n    volumes:\n      - ./data:/app/data\n      - ./chroma_db:/app/chroma_db\n    restart: unless-stopped\n    deploy:\n      resources:\n        limits:\n          cpus: '0.5'\n          memory: 512M\n\nnetworks:\n  default:\n    name: rag-network\n"
